global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'ingestion-service'
    static_configs:
      - targets: ['host.docker.internal:8001']

  - job_name: 'milvus'
    static_configs:
      - targets: ['milvus-standalone:9091']
